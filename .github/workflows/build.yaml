name: Build connector

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-2025
    steps:
      - uses: actions/checkout@v6

      - uses: microsoft/setup-msbuild@v2

      # DuckDB.proj's BuildMez target zips the connector into bin\AnyCPU\Debug\DuckDB.mez.
      - name: Build .mez
        shell: pwsh
        run: |
          msbuild DuckDB.proj
          Copy-Item bin\AnyCPU\Debug\DuckDB.mez duckdb-power-query-connector.mez

      - uses: actions/upload-artifact@v7
        with:
          name: duckdb-power-query-connector
          path: duckdb-power-query-connector.mez
          if-no-files-found: error

  # Loads the built .mez and reads a seeded table through it (Power Query SDK ->
  # connector -> DuckDB ODBC driver -> DuckDB file) using the PQTest harness.
  smoke-test:
    needs: build
    runs-on: windows-2025
    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v7
        with:
          name: duckdb-power-query-connector

      - name: Install DuckDB ODBC driver
        shell: pwsh
        run: |
          # Register the "DuckDB Driver" that DuckDB.pq references straight into the registry.
          # odbc_install.exe blocks on an interactive prompt on headless runners; these keys
          # are all it would write anyway. $ProgressPreference speeds up Invoke-WebRequest.
          $ProgressPreference = 'SilentlyContinue'
          $zip = "duckdb_odbc-windows-amd64.zip"
          Invoke-WebRequest "https://github.com/duckdb/duckdb-odbc/releases/download/v1.4.4.0/$zip" -OutFile $zip
          New-Item -ItemType Directory duckdb_odbc | Out-Null
          tar -xf $zip -C duckdb_odbc
          $dir = (Resolve-Path duckdb_odbc).Path

          $inst = "HKLM:\SOFTWARE\ODBC\ODBCINST.INI"
          New-Item "$inst\DuckDB Driver" -Force | Out-Null
          Set-ItemProperty "$inst\DuckDB Driver" Driver "$dir\duckdb_odbc.dll"
          Set-ItemProperty "$inst\DuckDB Driver" Setup  "$dir\duckdb_odbc_setup.dll"
          New-Item "$inst\ODBC Drivers" -Force | Out-Null
          Set-ItemProperty "$inst\ODBC Drivers" "DuckDB Driver" "Installed"

      - name: Seed test database
        shell: pwsh
        run: |
          # CLI version matches the ODBC driver (1.4.x) so the file format is readable.
          $ProgressPreference = 'SilentlyContinue'
          $cli = "duckdb_cli-windows-amd64.zip"
          Invoke-WebRequest "https://github.com/duckdb/duckdb/releases/download/v1.4.4/$cli" -OutFile $cli
          tar -xf $cli   # extracts duckdb.exe into the working dir
          .\duckdb.exe test.db "CREATE TABLE smoke AS SELECT * FROM range(10) t(n);"

      - name: Install Power Query SDK test tool
        shell: pwsh
        run: |
          nuget install Microsoft.PowerQuery.SdkTools -Version 2.155.2 -OutputDirectory nuget
          $pqtest = (Get-ChildItem nuget -Recurse -Filter PQTest.exe | Select-Object -First 1).FullName
          "PQTEST=$pqtest" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Smoke test the connector
        shell: pwsh
        run: |
          # Make any non-zero PQTest exit fail the step (default in PS 7.4+, set explicitly).
          $ErrorActionPreference = 'Stop'
          $PSNativeCommandUseErrorActionPreference = $true
          $mez = "duckdb-power-query-connector.mez"

          # PQTest runs the mashup engine from its own working dir, so queries reference
          # __DB_PATH__ and we substitute the seeded db's absolute path. The .pqout
          # baselines are path-independent (they're the data).
          $dbPath = Join-Path $env:GITHUB_WORKSPACE 'test.db'

          # Fast gate: does the .mez load and parse?
          & $env:PQTEST info -e $mez

          # Every test/*.query.pq is compared against its committed test/*.query.pqout.
          # Add a case = drop in a query + its baseline; no workflow change needed.
          foreach ($queryFile in Get-ChildItem test\*.query.pq) {
            $query = $queryFile.FullName
            $baseline = [IO.Path]::ChangeExtension($query, '.pqout')
            Write-Host "::group::$($queryFile.Name)"
            (Get-Content $query -Raw).Replace('__DB_PATH__', $dbPath) | Set-Content $query

            # Anonymous (local file, no token). Credentials are keyed to the data source
            # path, which differs per query, so set them per query.
            & $env:PQTEST credential-template -e $mez -q $query -ak Anonymous | & $env:PQTEST set-credential -e $mez -q $query

            # Strict regression: -fomof fails if the baseline is missing instead of
            # silently regenerating it. On the first run for a new query there's no
            # baseline, so generate + print it and fail loudly so it gets committed.
            if (Test-Path $baseline) {
              & $env:PQTEST compare -e $mez -q $query -fomof
            } else {
              $PSNativeCommandUseErrorActionPreference = $false
              & $env:PQTEST compare -e $mez -q $query
              $PSNativeCommandUseErrorActionPreference = $true
              if (-not (Test-Path $baseline)) {
                throw "compare did not generate $baseline — $($queryFile.Name) failed to evaluate (see the compare JSON above)."
              }
              Get-Content $baseline
              throw "No committed $baseline yet. Commit the content printed above; comparison is strict once it exists."
            }
            Write-Host "::endgroup::"
          }
