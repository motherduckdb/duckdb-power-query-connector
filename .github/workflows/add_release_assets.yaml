name: Add .mez file to a release

# Create the release manually in GitHub (tag + notes); publishing it triggers
# this, which grabs the .mez built for that commit and attaches it.
on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  attach:
    runs-on: ubuntu-latest
    steps:
      - name: Download .mez artifact
        uses: dawidd6/action-download-artifact@v11
        with:
          workflow: build.yaml
          workflow_conclusion: success
          commit: ${{ github.sha }}
          name: duckdb-power-query-connector

      - name: Add .mez artifact to release
        uses: softprops/action-gh-release@v2.3.2
        with:
          files: duckdb-power-query-connector.mez
